# Linting configuration (workspace-level, inherited by all crates)
[workspace.lints.rust]
# Warn on unused imports (tightened from allow — dead file cleanup complete)
unused_imports = "warn"
# Warn on dead code (tightened from allow — cycle 10 cleanup)
dead_code = "warn"
# Warn on unused variables (tightened from allow — cycle 10 cleanup)
unused_variables = "warn"
# Warn on deprecated items (no deprecated attrs in codebase — tightened cycle 12)
deprecated = "warn"
# Warn on ambiguous glob reexports (tightened cycle 12)
ambiguous_glob_reexports = "warn"
# Warn on irrefutable let patterns (tightened cycle 12)
irrefutable_let_patterns = "warn"
# Warn on unused mut bindings (no instances found — tightened from allow)
unused_mut = "warn"
# Warn on unexpected cfg checks (tightened from allow — python-bindings cleanup complete)
unexpected_cfgs = "warn"

[workspace.lints.clippy]
# Critical issue categories
complexity = { level = "warn", priority = -1 }
correctness = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
perf = { level = "warn", priority = -1 }

[lints]
workspace = true

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[profile.profiling]
inherits = "release"
debug = true
lto = false

# [profile.test]
# stack-size is managed per-test via RUST_MIN_STACK=8388608 environment variable
# The "stack-size" key in Cargo.toml is not recognized in this Cargo version
