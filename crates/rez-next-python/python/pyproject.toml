[project]
name = "rez_next"
version = "0.3.0"
description = "Python package for rez-next - drop-in replacement for rez"
requires-python = ">=3.8"
dependencies = []

[tool.setuptools.packages.find]
where = ["."]
include = ["rez_next*"]
