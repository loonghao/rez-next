# Release workflow — build cross-platform binaries, publish GitHub Release assets,
# publish Rust crates to crates.io, and publish Python wheels to PyPI.
#
# Triggered ONLY by workflow_dispatch (from release-please.yml or manual).
# This avoids duplicate runs: release-please creates a GitHub Release AND dispatches
# this workflow. If we also listened to `release: published` or `push: tags`, we'd
# get 2-3 parallel runs for the same tag.
#
# PyPI publishing uses Trusted Publisher (OIDC) — no API token needed.
# Setup required: https://docs.pypi.org/trusted-publishers/adding-a-publisher/
#   Publisher: GitHub Actions, Owner: loonghao, Repo: rez-next, Workflow: release.yml

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: rez-next

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (glibc)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          # Linux x86_64 (musl - static)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            archive: tar.gz
            use-cross: true
          # Linux aarch64 (glibc)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            use-cross: true
          # Linux aarch64 (musl - static)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            archive: tar.gz
            use-cross: true
          # macOS x86_64
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive: zip
          # Windows aarch64
          - target: aarch64-pc-windows-msvc
            os: windows-2022
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation targets)
        if: matrix.use-cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl-tools (for native musl builds)
        if: contains(matrix.target, 'musl') && matrix.use-cross != true
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Prepare archive (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/${BINARY_NAME}"
          ARCHIVE="${BINARY_NAME}-${{ matrix.target }}.tar.gz"
          chmod +x "$BINARY"
          tar czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" "${BINARY_NAME}"
          echo "ASSET=$ARCHIVE" >> $GITHUB_ENV

      - name: Prepare archive (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/${BINARY_NAME}.exe"
          ARCHIVE="${BINARY_NAME}-${{ matrix.target }}.zip"
          7z a "$ARCHIVE" "$BINARY"
          echo "ASSET=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.ASSET }}
          retention-days: 1

  upload:
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sh -c '
            for f; do
              hash=$(sha256sum "$f" | cut -d" " -f1)
              name=$(basename "$f")
              printf "%s  %s\n" "$hash" "$name"
            done
          ' sh {} + | sort -k2 > ../checksums-sha256.txt
          cd ..
          echo "=== checksums-sha256.txt ==="
          cat checksums-sha256.txt
          echo "=== Verifying format (hash<two-spaces>filename) ==="
          awk '{ if (NF != 2 || length($1) != 64) { print "ERROR: malformed line: " $0; exit 1 } }' checksums-sha256.txt
          echo "Format OK ✓"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/rez-next-*/*
            checksums-sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wheels:
    name: Build Python wheels (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
          - name: windows
            os: windows-2022
          - name: macos
            os: macos-14

    steps:
      - uses: actions/checkout@v6

      - uses: loonghao/vx@main
        with:
          tools: "maturin"
          cache: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels (abi3 — compatible with Python 3.8+)
        working-directory: crates/rez-next-python
        run: vx maturin build --release --features pyo3/extension-module --out dist

      - name: Build sdist
        if: matrix.name == 'linux'
        working-directory: crates/rez-next-python
        run: vx maturin sdist --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.name }}
          path: crates/rez-next-python/dist/*.whl
          retention-days: 1

      - name: Upload sdist
        if: matrix.name == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: crates/rez-next-python/dist/*.tar.gz
          retention-days: 1

  test-wheel:
    name: Test wheel (${{ matrix.name }}, py${{ matrix.python-version }})
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
          - name: windows
            os: windows-2022
          - name: macos
            os: macos-14
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          name: wheels-${{ matrix.name }}
          path: dist/

      - name: Install wheel and test dependencies
        shell: bash
        run: |
          echo "=== Listing dist/ ==="
          ls -la dist/ || echo "(dist is empty or missing)"
          echo "=== Installing wheel ==="
          python -m pip install dist/*.whl
          python -m pip install pytest
          echo "=== Installed packages ==="
          python -m pip show rez-next || true

      - name: Smoke test — basic import
        shell: bash
        run: |
          python -c "
          import traceback, sys
          print('Python:', sys.version)
          print('sys.path:', sys.path[:5])
          try:
              import rez_next
              print('rez_next location:', rez_next.__file__)
              print('rez_next version:', rez_next.__version__)
              v = rez_next.Version('1.2.3')
              print('Version created:', v)
              r = rez_next.VersionRange('1.0+')
              print('VersionRange created:', r)
              assert r.contains(v), 'VersionRange.contains failed'
              print('Smoke test passed!')
          except Exception as e:
              traceback.print_exc()
              sys.exit(1)
          "

      - name: Run all Python tests
        working-directory: crates/rez-next-python
        run: python -m pytest tests/ -v --tb=short

  publish-crates:
    name: Publish Rust crates to crates.io
    needs:
      - upload
      - test-wheel
    # publish-crates and publish-pypi run concurrently after test-wheel passes.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish workspace crates in dependency order
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          # Cargo validates dependent workspace crates against crates.io during
          # `cargo publish --dry-run`, so preflight checks are not reliable until
          # freshly published dependency versions have propagated through the index.
          # We therefore publish in dependency order and retry on index lag.
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN is not configured." >&2

            exit 1
          fi

          packages=(
            rez-next-common
            rez-next-version
            rez-next-package
            rez-next-rex
            rez-next-cache
            rez-next-bind
            rez-next-repository
            rez-next-solver
            rez-next-search
            rez-next-context
            rez-next-build
            rez-next-suites
            rez-next
          )

          for package in "${packages[@]}"; do
            echo "::group::Publishing ${package}"
            attempt=1
            while true; do
              set +e
              output="$(cargo publish --locked -p "${package}" 2>&1)"
              status=$?
              set -e

              echo "${output}"

              if [ ${status} -eq 0 ]; then
                echo "Published ${package}."
                echo "::endgroup::"
                break
              fi

              if echo "${output}" | grep -qi "already uploaded"; then
                echo "${package} is already published for this version; continuing."
                echo "::endgroup::"
                break
              fi

              if echo "${output}" | grep -Eq "failed to select a version for the requirement|no matching package named"; then
                if [ ${attempt} -ge 10 ]; then
                  echo "Timed out waiting for crates.io index propagation for ${package}." >&2
                  echo "::endgroup::"
                  exit ${status}
                fi

                echo "crates.io index is not ready for ${package} yet; retrying in 20 seconds (attempt ${attempt}/10)."
                attempt=$((attempt + 1))
                sleep 20
                continue
              fi

              echo "::endgroup::"
              exit ${status}
            done
          done

  publish-pypi:
    name: Publish Python wheels to PyPI
    needs:
      - test-wheel
    # publish-pypi is intentionally decoupled from publish-crates:
    # Python wheel publishing should not be blocked by Rust crate publishing.
    # Both jobs run after test-wheel passes.
    # Triggered only by workflow_dispatch, so every run is intentional.
    runs-on: ubuntu-24.04
    permissions:
      id-token: write  # required for PyPI Trusted Publisher (OIDC)
    steps:
      - name: Download Linux wheels
        uses: actions/download-artifact@v8
        with:
          name: wheels-linux
          path: dist/

      - name: Download Windows wheels
        uses: actions/download-artifact@v8
        with:
          name: wheels-windows
          path: dist/

      - name: Download macOS wheels
        uses: actions/download-artifact@v8
        with:
          name: wheels-macos
          path: dist/

      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist/

      - name: List Python distributions
        run: ls -la dist/

      - name: Publish to PyPI via Trusted Publisher (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Trusted Publisher configured at https://pypi.org/manage/account/publishing/
          # No PYPI_API_TOKEN needed — uses OIDC identity from GitHub Actions.
          verbose: true

