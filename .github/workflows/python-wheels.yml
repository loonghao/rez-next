name: Python Wheels

on:
  push:
    tags:
      - 'v*'
    branches:
      - auto-improve
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build Python wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: loonghao/vx@main
        with:
          tools: "maturin"
          cache: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        working-directory: crates/rez-next-python
        run: vx maturin build --release --features pyo3/extension-module --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: crates/rez-next-python/dist/*.whl

  test-wheel:
    name: Test wheel (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: loonghao/vx@main
        with:
          tools: "uv"
          cache: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/

      - name: Install wheel and test dependencies
        shell: bash
        run: |
          vx uv pip install --system dist/*.whl
          vx uv pip install --system pytest

      - name: Smoke test — basic import
        shell: bash
        run: |
          python -c "
          import traceback, sys
          try:
              import rez_next
              print('rez_next version:', rez_next.__version__)
              v = rez_next.Version('1.2.3')
              r = rez_next.VersionRange('1.0+')
              assert r.contains(v), 'VersionRange.contains failed'
              print('Smoke test passed!')
          except Exception as e:
              traceback.print_exc()
              sys.exit(1)
          "

      - name: Run all Python tests
        working-directory: crates/rez-next-python
        run: pytest tests/ -v --tb=short -x
