name: Python Wheels

on:
  push:
    tags:
      - 'v*'
    branches:
      - auto-improve
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build Python wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build wheels (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: crates/rez-next-python
        run: |
          maturin build --release --features pyo3/extension-module --out dist

      - name: Build wheels (Windows/macOS)
        if: matrix.os != 'ubuntu-latest'
        working-directory: crates/rez-next-python
        run: |
          maturin build --release --features pyo3/extension-module --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: crates/rez-next-python/dist/*.whl

  test-wheel:
    name: Test Python wheel (${{ matrix.os }})
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/

      - name: Install wheel
        shell: bash
        run: |
          pip install dist/*.whl

      - name: Run Python tests
        run: |
          python -c "
          import rez_next
          print('rez_next version:', rez_next.__version__)

          # Test Version API
          from rez_next import Version, VersionRange
          v = Version('1.2.3')
          r = VersionRange('1.0+')
          assert r.contains(v), 'VersionRange.contains failed'
          print('Version API: OK')

          # Test Suite API
          from rez_next.suite import Suite
          s = Suite(description='Test')
          s.add_context('dev', ['python-3.9'])
          assert s.__len__() == 1
          print('Suite API: OK')

          # Test Config API
          from rez_next import Config
          cfg = Config()
          assert isinstance(cfg.packages_path, list)
          print('Config API: OK')

          print('All tests passed!')
          "
