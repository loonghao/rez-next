name: Python Wheels

on:
  push:
    tags:
      - 'v*'
    branches:
      - auto-improve
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build Python wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build wheels
        working-directory: crates/rez-next-python
        run: maturin build --release --features pyo3/extension-module --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: crates/rez-next-python/dist/*.whl

  test-wheel:
    name: Test wheel (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/

      - name: Install wheel and test dependencies
        shell: bash
        run: |
          uv pip install --system dist/*.whl
          uv pip install --system pytest

      - name: Smoke test — basic import
        run: |
          python -c "
          import rez_next
          print('rez_next version:', rez_next.__version__)
          v = rez_next.Version('1.2.3')
          r = rez_next.VersionRange('1.0+')
          assert r.contains(v), 'VersionRange.contains failed'
          print('Smoke test passed!')
          "

      - name: Run all Python tests
        working-directory: crates/rez-next-python
        run: pytest tests/ -v --tb=short -x

