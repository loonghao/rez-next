# CI workflow using rust-actions-toolkit v4 reusable workflow
# See: https://github.com/loonghao/rust-actions-toolkit
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  ci:
    uses: loonghao/rust-actions-toolkit/.github/workflows/reusable-ci.yml@v4
    with:
      rust-toolchain: stable
      # Disable release build consistency test in CI
      # (release builds are validated by the release workflow itself)
      test-release-builds: false
