# CI workflow for rez-next
# Uses vx (universal dev tool manager) + just (task runner) for consistent
# local/CI parity. All Rust commands are defined in justfile.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]

permissions:
  contents: read
  actions: read
  security-events: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  release-version:
    name: Release Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/check_release_versions.py
      - name: Test benchmark tooling
        run: python -m unittest discover -s metrics/benchmarking/scripts -p "test_*.py" -v

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: loonghao/vx@main
        with:
          tools: "actionlint"
          cache: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: vx actionlint

  rustfmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: loonghao/vx@main
        with:
          tools: "just"
          cache: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt
      - run: vx just fmt-check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: loonghao/vx@main
        with:
          tools: "just"
          cache: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: vx just lint-ci

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: loonghao/vx@main
        with:
          tools: "just"
          cache: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - run: vx just doc-check
        env:
          RUSTDOCFLAGS: "-D warnings"

  test-rust-1-95:
    name: Test - Rust 1.95.0

    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: loonghao/vx@main
        with:
          tools: "just"
          cache: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - run: vx cargo check --workspace --exclude rez-next-python --all-targets
      - run: vx just test

  cli-e2e:
    name: CLI E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: loonghao/vx@main
        with:
          tools: "just"
          cache: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-e2e-v4
      - run: vx just cli-e2e

  test-macos:
    name: Test - macOS
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --exclude rez-next-python --all-targets
      - run: cargo test --workspace -- --test-threads=1

  test-win-msvc:
    name: Test - win-msvc
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: x86_64-pc-windows-msvc
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --exclude rez-next-python --all-targets
      - run: cargo test --workspace -- --test-threads=1
      - name: Build and smoke-test release executables
        shell: pwsh
        run: |
          cargo build --release --bin rez-next --bin rez
          target/release/rez-next.exe --version
          target/release/rez.exe --version
      - name: Smoke-test CMD and PowerShell environment activation
        shell: pwsh
        run: |
          $repo = Join-Path $env:RUNNER_TEMP "rez-next-smoke-repo"
          $package = Join-Path $repo "smoke/1.0.0"
          New-Item -ItemType Directory -Force -Path $package | Out-Null
          @'
          name = "smoke"
          version = "1.0.0"
          def commands():
              env.REZ_NEXT_SMOKE = "ready"
          '@ | Set-Content -Encoding utf8 (Join-Path $package "package.py")

          $cmdOutput = & target/release/rez.exe env --shell cmd --paths $repo smoke -c 'if "%REZ_NEXT_SMOKE%"=="ready" (echo cmd-ok) else (exit /b 9)'
          if ($LASTEXITCODE -ne 0 -or ($cmdOutput -join "`n") -notmatch "cmd-ok") {
              throw "CMD activation failed: $cmdOutput"
          }
          if (($cmdOutput -join "`n") -notmatch "Resolved packages") {
              throw "CMD command mode omitted the resolved package summary: $cmdOutput"
          }

          $interactiveOutput = "exit" | & target/release/rez.exe env --shell cmd --paths $repo smoke
          if ($LASTEXITCODE -ne 0 -or ($interactiveOutput -join "`n") -notmatch "You are now in a rez-configured environment") {
              throw "Interactive CMD activation omitted the Rez environment banner: $interactiveOutput"
          }

          $pwshOutput = & target/release/rez.exe env -q --shell powershell --paths $repo smoke -c 'if ($env:REZ_NEXT_SMOKE -eq "ready") { Write-Output "powershell-ok" } else { exit 9 }'
          if ($LASTEXITCODE -ne 0 -or ($pwshOutput -join "`n") -notmatch "powershell-ok") {
              throw "PowerShell activation failed: $pwshOutput"
          }

  test-win-gnu:
    name: Test - win-gnu
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: x86_64-pc-windows-gnu
      - run: rustup target add x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --exclude rez-next-python --all-targets --target x86_64-pc-windows-gnu
      - run: cargo test -p rez-next-util which::tests --lib --target x86_64-pc-windows-gnu -- --test-threads=1

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    name: Code Coverage
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Build rez-next binary (required for e2e tests)
        run: cargo build --bin rez-next
      - run: cargo llvm-cov --workspace --exclude rez-next-python --lib --bins --lcov --output-path lcov.info -- --test-threads=1
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  python-binding-tests:
    name: Python Binding Tests (maturin + pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: python-binding-${{ matrix.python-version }}
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create virtualenv and install maturin and test dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest pytest-benchmark
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> "$GITHUB_ENV"
          echo "$VIRTUAL_ENV/bin" >> "$GITHUB_PATH"
      - name: Lint Python package
        if: matrix.python-version == '3.12'
        working-directory: crates/rez-next-python
        run: pip install ruff==0.15.21 && ruff check python tests
      - name: Build and install Python binding (dev mode)
        working-directory: crates/rez-next-python
        run: maturin develop --release
      - name: Run Python binding tests
        working-directory: crates/rez-next-python
        run: pytest tests/ -v --tb=short
      - name: Build wheel artifact
        if: matrix.python-version == '3.12'
        working-directory: crates/rez-next-python
        run: maturin build --release --out dist
      - name: Smoke-test installed wheel
        if: matrix.python-version == '3.12'
        shell: bash
        run: |
          python -m venv "$RUNNER_TEMP/rez-next-wheel"
          "$RUNNER_TEMP/rez-next-wheel/bin/python" -m pip install crates/rez-next-python/dist/*.whl
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/rez-next-wheel/bin/python" -I -c "import rez, rez_next; print(rez_next.__version__)"

  python-binding-windows:
    name: Python Binding Tests - Windows
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: python-binding-windows
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Create virtualenv and install test dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          $venv = (Resolve-Path .venv).Path
          "$venv\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "VIRTUAL_ENV=$venv" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & "$venv\Scripts\python.exe" -m pip install maturin pytest pytest-benchmark
      - name: Build and install Python binding
        working-directory: crates/rez-next-python
        run: maturin develop --release
      - name: Run Python binding tests
        working-directory: crates/rez-next-python
        run: pytest tests/ -v --tb=short
