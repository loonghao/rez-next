# CI workflow for rez-next
# Uses vx (universal dev tool manager) + just (task runner) for consistent
# local/CI parity. All Rust commands are defined in justfile.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]

permissions:
  contents: read
  actions: read
  security-events: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: loonghao/vx@main
        with:
          tools: "actionlint"
          cache: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: vx actionlint

  rustfmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: loonghao/vx@main
        with:
          tools: "just"
          cache: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@1.100.0
        with:
          components: rustfmt
      - run: vx just fmt-check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: loonghao/vx@main
        with:
          tools: "just"
          cache: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@1.100.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: vx just lint-ci

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: loonghao/vx@main
        with:
          tools: "just"
          cache: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@1.100.0
      - uses: Swatinem/rust-cache@v2
      - run: vx just doc-check
        env:
          RUSTDOCFLAGS: "-D warnings"

  test-rust-1-95:
    name: Test - Rust 1.95.0

    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: loonghao/vx@main
        with:
          tools: "just"
          cache: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@1.100.0
      - uses: Swatinem/rust-cache@v2
      - run: vx cargo check --workspace --exclude rez-next-python --all-targets
      - run: vx cargo test -p rez-next-util which::tests --lib -- --test-threads=1
      - run: vx cargo test -p rez-next-build vcs::tests::test_git_vcs_get --lib -- --test-threads=1

  cli-e2e:
    name: CLI E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: loonghao/vx@main
        with:
          tools: "just"
          cache: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@1.100.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-e2e-v4
      - run: vx just cli-e2e

  test-macos:
    name: Test - macOS
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.100.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --exclude rez-next-python --all-targets
      - run: cargo test -p rez-next-util which::tests --lib -- --test-threads=1
      - run: cargo test -p rez-next-build vcs::tests::test_git_vcs_get --lib -- --test-threads=1

  test-win-msvc:
    name: Test - win-msvc
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.100.0
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --exclude rez-next-python --all-targets
      - run: cargo test -p rez-next-util which::tests --lib -- --test-threads=1
      - run: cargo test -p rez-next-build vcs::tests::test_git_vcs_get --lib -- --test-threads=1

  test-win-gnu:
    name: Test - win-gnu
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.100.0
        with:
          targets: x86_64-pc-windows-gnu
      - run: rustup target add x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --exclude rez-next-python --all-targets --target x86_64-pc-windows-gnu
      - run: cargo test -p rez-next-util which::tests --lib --target x86_64-pc-windows-gnu -- --test-threads=1

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    name: Code Coverage
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.100.0
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Build rez-next binary (required for e2e tests)
        run: cargo build --bin rez-next
      - run: cargo llvm-cov --workspace --exclude rez-next-python --lib --bins --lcov --output-path lcov.info -- --test-threads=1
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  python-binding-tests:
    name: Python Binding Tests (maturin + pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.100.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: python-binding-${{ matrix.python-version }}
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create virtualenv and install maturin and test dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest pytest-benchmark
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> "$GITHUB_ENV"
          echo "$VIRTUAL_ENV/bin" >> "$GITHUB_PATH"
      - name: Build and install Python binding (dev mode)
        working-directory: crates/rez-next-python
        run: maturin develop --release
      - name: Run Python binding tests
        working-directory: crates/rez-next-python
        run: pytest tests/ -v --tb=short
