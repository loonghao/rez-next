name: Performance Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      benchmark_type:
        description: 'Type of benchmark to run'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - comprehensive

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Quick benchmarks — version + package + rex  (~2 min, every PR)
  # ─────────────────────────────────────────────────────────────────────────
  bench-quick:
    name: Quick Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: bench-quick-v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Run quick benchmarks (version + package + rex)
        env:
          CRITERION_QUICK: "1"
        run: |
          cargo bench \
            --bench version_benchmark \
            --bench simple_package_benchmark \
            --bench rex_benchmark \
            2>&1 | tee benchmark-quick.txt

      - name: Parse Criterion output → JSON
        run: |
          python metrics/benchmarking/scripts/parse_criterion.py \
            benchmark-quick.txt > benchmark-quick.json
          echo "=== Parsed results ==="
          cat benchmark-quick.json

      - name: Generate RESULTS.md (quick subset)
        run: |
          python metrics/benchmarking/scripts/generate_results.py \
            --bench-json benchmark-quick.json \
            --out metrics/benchmarking/RESULTS.md
          echo "=== RESULTS.md preview ==="
          head -60 metrics/benchmarking/RESULTS.md

      - name: Upload quick benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bench-quick-${{ github.sha }}
          path: |
            benchmark-quick.txt
            benchmark-quick.json
            metrics/benchmarking/RESULTS.md
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────
  # Full benchmark suite + auto-commit RESULTS.md  (push to main only)
  # ─────────────────────────────────────────────────────────────────────────
  bench-full:
    name: Full Benchmarks + Publish Results
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.benchmark_type == 'comprehensive')

    permissions:
      contents: write   # needed to push RESULTS.md back to main

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: bench-full-v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Run full benchmark suite
        env:
          CRITERION_QUICK: "1"
        run: |
          cargo bench \
            --bench version_benchmark \
            --bench package_benchmark \
            --bench simple_package_benchmark \
            --bench rex_benchmark \
            --bench solver_bench_v2 \
            --bench solver_real_repo_bench \
            --bench context_operations_benchmark \
            --bench depends_benchmark \
            --bench pip_conversion_benchmark \
            2>&1 | tee benchmark-full.txt

      - name: Parse Criterion output → JSON
        run: |
          python metrics/benchmarking/scripts/parse_criterion.py \
            benchmark-full.txt > benchmark-full.json
          echo "=== Parsed results ==="
          python -c "
          import json, sys
          d = json.load(open('benchmark-full.json'))
          print(f'Total benchmarks: {len(d[\"results\"])}')
          print(f'Regressions: {d[\"regressions\"]}')
          for r in d['results']:
              print(f'  {r[\"name\"]:<50} {r[\"mean_human\"]}')
          "

      - name: Generate RESULTS.md (full suite)
        run: |
          python metrics/benchmarking/scripts/generate_results.py \
            --bench-json benchmark-full.json \
            --out metrics/benchmarking/RESULTS.md

      - name: Show regression summary
        run: |
          python -c "
          import json, sys
          d = json.load(open('benchmark-full.json'))
          regressions = d.get('regressions', [])
          if regressions:
              print('::warning::Performance regressions detected: ' + ', '.join(regressions))
          else:
              print('No performance regressions detected.')
          "

      - name: Commit RESULTS.md and artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage results
          git add metrics/benchmarking/RESULTS.md
          git add metrics/benchmarking/artifacts/ || true

          # Only commit if something changed
          if git diff --cached --quiet; then
            echo "No changes to benchmark results."
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            git commit -m "chore(bench): update performance results [${SHORT_SHA}] [skip ci]"
            git push origin HEAD:main
          fi

      - name: Upload full benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bench-full-${{ github.sha }}
          path: |
            benchmark-full.txt
            benchmark-full.json
            metrics/benchmarking/RESULTS.md
            metrics/benchmarking/artifacts/
            target/criterion/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # Regression gate — fail PR if any Criterion regression detected
  # ─────────────────────────────────────────────────────────────────────────
  regression-check:
    name: Regression Gate
    runs-on: ubuntu-latest
    needs: [bench-quick]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Download quick bench results
        uses: actions/download-artifact@v8
        with:
          name: bench-quick-${{ github.sha }}
          path: bench-artifacts/

      - name: Check for regressions
        run: |
          python -c "
          import json, sys
          d = json.load(open('bench-artifacts/benchmark-quick.json'))
          regressions = d.get('regressions', [])
          if regressions:
              print(f'FAIL: {len(regressions)} regression(s): {regressions}')
              sys.exit(1)
          print(f'PASS: No regressions ({len(d[\"results\"])} benchmarks checked).')
          "
